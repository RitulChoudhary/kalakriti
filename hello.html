<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KalaKriti | DIY Creations</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>KalaKriti</h1>
  <nav>
    <a href="#home">Home</a>
    <a href="#gallery">Creations</a>
    <a href="#about">About</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<section id="home" class="hero">
  <h2>Handcrafted with Passion</h2>
  <p>Discover unique DIY creations</p>
</section>

<section id="gallery">
  <h2>Our Creations</h2>
  <div class="grid">
    <div class="card">
      <img src="img1.jpg">
      <h3>Clay Pot Art</h3>
      <p>Traditional handcrafted beauty</p>
    </div>
    <div class="card">
      <img src="img2.jpg">
      <h3>Wall Hanging</h3>
      <p>Modern DIY decor</p>
    </div>
  </div>
</section>

<section id="about">
  <h2>About KalaKriti</h2>
  <p>We bring creativity to life through handmade art.</p>
</section>

<section id="contact">
  <h2>Contact</h2>
  <form>
    <input type="text" placeholder="Your Name" required>
    <input type="email" placeholder="Email" required>
    <textarea placeholder="Message"></textarea>
    <button type="submit">Send</button>
  </form>
</section>

<footer>
  <p>© 2026 KalaKriti</p>
</footer>

</body>
</html>
